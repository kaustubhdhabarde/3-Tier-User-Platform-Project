# Trigger Test-1
name: Enterprise DevSecOps CICD Pipeline
on:
  push:
    branches:
      - qa
    paths:
      - client/**
      - server/**
      - .github/workflows/qa-cicd.yml

permissions:
  contents: write
  id-token: write
  
jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code 0
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  # ... (all your scan, lint, test jobs remain unchanged)

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    needs: client-test
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        run: npm ci
      - name: Build client
        run: npm run build --if-present

  docker:
    name: Docker Build & Push
    needs:
      - client-build
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          load: true
          push: false
          tags: |
            kaustubhdhabarde/nodejs-app:${{ github.sha }}
            kaustubhdhabarde/nodejs-app:latest
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true
      - name: Run Trivy image scan (JSON)
        run: |
          trivy image kaustubhdhabarde/nodejs-app:${{ github.sha }} \
            --format json \
            --output image-trivy-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0
      - name: Run Trivy image scan (TABLE)
        run: |
          trivy image kaustubhdhabarde/nodejs-app:${{ github.sha }} \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > image-trivy-report.txt
      - name: Upload Trivy image JSON report
        uses: actions/upload-artifact@v4
        with:
          name: image-trivy-json-report
          path: image-trivy-report.json
      - name: Upload Trivy image TABLE report
        uses: actions/upload-artifact@v4
        with:
          name: image-trivy-table-report
          path: image-trivy-report.txt
      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: source-sbom.spdx.json
          upload-artifact: true
      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: kaustubhdhabarde/nodejs-app:${{ github.sha }}
          format: spdx-json
          output-file: image-sbom.spdx.json
          upload-artifact: true  
      - name: Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            kaustubhdhabarde/nodejs-app:${{ github.sha }}
            kaustubhdhabarde/nodejs-app:latest

  update-qa-manifest:
    name: Update QA Manifest
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa
      - name: Update image tag in manifest
        run: |
          sed -i "s|image: kaustubhdhabarde/nodejs-app:.*|image: kaustubhdhabarde/nodejs-app:${GITHUB_SHA}|g" k8-manifests/qa/app-deployment.yaml
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/qa/app-deployment.yaml
          git commit -m "Update QA image to ${GITHUB_SHA} [skip ci]" || echo "No changes to commit"
          git push origin qa

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: update-qa-manifest
    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: my-cluster
      K8S_NAMESPACE: qa
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: qa
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Generate kubeconfig for EKS
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"
      - name: Deploy manifests
        run: kubectl apply -f k8-manifests/qa/ -n "${K8S_NAMESPACE}"
      - name: Verify rollout
        run: kubectl rollout status deployment/nodejs-app -n "${K8S_NAMESPACE}" --timeout=180s
